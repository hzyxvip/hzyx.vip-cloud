# 医享云 · 独立测试环境 Nginx 站点
# 建议子域：test.hzyx.vip（与现网 www.hzyx.vip 旧系统并存，互不影响）
# 现网可登录：http://www.hzyx.vip/#/main  （Hash 路由，另一套程序，勿覆盖）
#
# 本仓库新版本使用 History 路由，访问形如：https://test.hzyx.vip/login
#
# 安装步骤（Linux + 已有 Nginx 时）：
#   1. 修改下方 root、ssl_certificate 路径
#   2. sudo cp deploy/nginx-test.hzyx.vip.conf /etc/nginx/conf.d/medical-cloud-test.conf
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# DNS：增加 A 记录  test.hzyx.vip → 云服务器公网 IP（可与 www 同 IP，靠 server_name 区分）

server {
    listen 80;
    server_name test.hzyx.vip;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name test.hzyx.vip;

    ssl_certificate     /etc/nginx/ssl/test.hzyx.vip/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/test.hzyx.vip/privkey.pem;

    root /www/medical-cloud-test/dist;
    index index.html;

    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3006/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/medical-cloud-test.access.log;
    error_log  /var/log/nginx/medical-cloud-test.error.log;
}
